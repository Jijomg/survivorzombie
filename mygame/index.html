<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คำสัญญาเอาชีวิตรอดในฝูงซอมบี้</title>
    <style>
        /* ------------------------------------- */
        /* การตั้งค่าไฟล์ URLS (เปลี่ยนชื่อไฟล์ที่นี่) */
        /* ------------------------------------- */
        :root {
            --player-sprite: url('player.png'); 
            --zombie-image: url('zombie.png'); 
            --background-image: url('Gemini_Generated_Image_mr7qvimr7qvimr7q.png'); 
            --human-image: url('human.png'); 
            --hit-effect-image: url('hit.png'); 
        }

        body { 
            margin: 0; 
            background-color: #111; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif; 
            touch-action: none; 
            user-select: none;
        }

        #gameArea { 
            position: relative; 
            width: 100%; 
            max-width: 430px; 
            height: 100vh; 
            max-height: 932px; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); 
            background-image: var(--background-image); 
            background-size: cover; 
            background-position: bottom center; 
            background-color: #5d6d7e; 
        }

        /* ------------------------------------- */
        /* หน้าจอเริ่มต้น (Start Screen) */
        /* ------------------------------------- */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            z-index: 50; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #gameLogo {
            width: 85%; 
            max-width: 350px; 
            height: auto; 
            margin-bottom: 30px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); 
        }

        #startScreen p {
            font-size: 20px;
            color: #ecf0f1;
            line-height: 1.6;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.15);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #startBtn {
            padding: 15px 40px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            background-color: #2ecc71;
            border: 2px solid #27ae60;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #27ae60, 0 10px 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        #startBtn:active {
            transform: translateY(6px); 
            box-shadow: 0 0px 0 #27ae60, 0 4px 4px rgba(0,0,0,0.5);
        }
        
        /* ------------------------------------- */
        /* ตัวละครและศัตรู */
        /* ------------------------------------- */
       #player {
    position: absolute;
    bottom: 10%; 
    left: 50%;
    transform: translateX(-50%);
    /* ปรับกรอบให้สูงขึ้นเพื่อให้ดูยืด ไม่โดนบีบ */
    width: 120px; 
    height: 160px; 
    
    background-image: var(--player-sprite);
    /* ปรับขนาดภาพรวม: ให้ความกว้างครอบคลุม 2 เฟรม และความสูงครอบคลุม 2 แถว */
    /* ลองใช้ค่าที่เจาะจงเพื่อให้สัดส่วน pixel ไม่เพี้ยน */
    background-size: 240% 210%; 
    
    /* ท่าเริ่มต้น (รูปแถวล่าง) */
    background-position: center 100%; 
    background-repeat: no-repeat;
    z-index: 10;
    
    /* เพิ่มบรรทัดนี้เพื่อให้ภาพ Pixel Art คมชัด ไม่เบลอ */
    image-rendering: pixelated;
}

/* ท่าต่อยซ้าย (รูปบนซ้าย) */
#player.punch-left { 
    background-position: 5% 5%; 
} 

/* ท่าต่อยขวา (รูปบนขวา) */
#player.punch-right { 
    background-position: 95% 5%; 
}

        .enemy {
            position: absolute;
            width: 90px;
            height: 90px;
            background-image: var(--zombie-image); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: crosshair;
            z-index: 5;
            transition: transform 0.1s; 
        }

        .human {
            position: absolute;
            width: 80px;
            height: 80px;
            background-image: var(--human-image); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: not-allowed;
            z-index: 6;
            transition: transform 0.1s;
        }

        .hit-effect {
            position: absolute;
            width: 100px;
            height: 100px;
            background-image: var(--hit-effect-image); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 15;
            pointer-events: none; 
            animation: burst 0.3s ease-out forwards; 
        }

        @keyframes burst {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 10px;
            z-index: 20;
            border: 2px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none; 
        }
        
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 15px;
            display: none;
            text-align: center;
            z-index: 30;
            border: 3px solid #f1c40f;
            width: 80%; 
            box-sizing: border-box;
        }
        .hp-heart { color: #e74c3c; }
    </style>
</head>
<body>

<div id="gameArea">
    <div id="startScreen">
        <img id="gameLogo" src="logo.png" alt="โลโก้เกม" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<h1 style=\'color:#e74c3c; font-size:36px; margin-bottom:20px;\'>คำสัญญาเอาชีวิตรอด<br>ในฝูงซอมบี้</h1>');">
        <p>🎯 <b>เป้าหมาย:</b> กำจัดซอมบี้ให้ครบ 100 ตัว<br><br>⚠️ <b>คำเตือน:</b> ห้ามโจมตีเพื่อนมนุษย์เด็ดขาด!</p>
        <button id="startBtn">เริ่มภารกิจ</button>
    </div>

    <div id="ui">
        กำจัด: <span id="score" style="color: #2ecc71;">0</span> / 100<br>
        พลังชีวิต: <span id="hpDisplay"></span>
    </div>
    <div id="player"></div>
    <div id="message"></div>
</div>

<script>
    let score = 0;
    let hp = 3; 
    const maxScore = 100;
    
    const gameArea = document.getElementById('gameArea');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');
    const uiDisplay = document.getElementById('ui');
    const scoreDisplay = document.getElementById('score');
    const hpDisplay = document.getElementById('hpDisplay');
    const messageDisplay = document.getElementById('message');
    const player = document.getElementById('player');
    
    let gameActive = false; 
    let spawnInterval;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // ----------------------------------------------------
    // ตั้งค่าเพลงประกอบ (BGM)
    // ----------------------------------------------------
    const bgMusic = new Audio('bgm.mp3'); // ระบุชื่อไฟล์เพลงของคุณตรงนี้
    bgMusic.loop = true; // ตั้งให้เพลงเล่นวนซ้ำ
    bgMusic.volume = 0.4; // ปรับความดังเพลง (0.0 ถึง 1.0) ตั้งไว้ 0.4 จะได้ไม่กลบเสียงต่อย
    
    startBtn.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        // เริ่มเล่นเพลงประกอบ
        bgMusic.play().catch(err => console.log("รอการอนุญาตเล่นเสียงจากเบราว์เซอร์"));
        
        startScreen.style.display = 'none'; 
        uiDisplay.style.display = 'block'; 
        gameActive = true; 
        
        spawnInterval = setInterval(spawnEntity, 800); 
    });

    function playSound(type) {
        if (audioCtx.state === 'suspended') return; 
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'punch') {
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'hurt') {
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }
    }

    function updateHP() {
        let hearts = "";
        for(let i=0; i<hp; i++) { hearts += "<span class='hp-heart'>❤</span> "; }
        hpDisplay.innerHTML = hearts;
    }
    updateHP();

    function spawnEntity() {
        if (!gameActive) return;

        const isHuman = Math.random() < 0.2; 
        const entity = document.createElement('div');
        
        if (isHuman) {
            entity.classList.add('human');
            entity.dataset.type = 'human';
        } else {
            entity.classList.add('enemy');
            entity.dataset.type = 'zombie';
        }

        const gameWidth = gameArea.clientWidth;
        const gameHeight = gameArea.clientHeight;

        const edge = Math.floor(Math.random() * 3);
        let startX, startY;

        if (edge === 0) { 
            startX = -90;
            startY = Math.random() * (gameHeight * 0.6);
        } else if (edge === 1) { 
            startX = gameWidth + 90;
            startY = Math.random() * (gameHeight * 0.6);
        } else { 
            startX = Math.random() * (gameWidth - 90);
            startY = -90;
        }

        entity.style.left = startX + 'px';
        entity.style.top = startY + 'px';
        gameArea.appendChild(entity);

        let speed;
        if (score < 50) {
            speed = Math.random() * 1.0 + 0.8; 
        } else {
            speed = Math.random() * 2 + 1.5; 
        }

        const targetX = gameWidth / 2 - 45; 
        const targetY = player.offsetTop + (player.offsetHeight / 2) - 45;

        function moveEntity() {
            if (!gameActive || !entity.parentElement) return;

            const currentX = parseFloat(entity.style.left);
            const currentY = parseFloat(entity.style.top);
            
            const dx = targetX - currentX;
            const dy = targetY - currentY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 50) {
                entity.remove(); 
                
                if (entity.dataset.type === 'zombie') {
                    hp--;
                    updateHP();
                    playSound('hurt'); 
                    player.style.opacity = 0.5;
                    setTimeout(() => player.style.opacity = 1, 200);

                    if (hp <= 0) endGame(false);
                }
                return;
            }

            entity.style.left = currentX + (dx / distance) * speed + 'px';
            entity.style.top = currentY + (dy / distance) * speed + 'px';

            requestAnimationFrame(moveEntity);
        }
        moveEntity();

        function hitEntity(e) {
            e.preventDefault();
            if (!gameActive) return;
            
            const currentX = parseFloat(entity.style.left);
            const currentY = parseFloat(entity.style.top);
            
            if (currentX < targetX) {
                player.className = 'punch-left'; 
            } else {
                player.className = 'punch-right'; 
            }
            clearTimeout(player.punchTimeout);
            player.punchTimeout = setTimeout(() => { player.className = ''; }, 150);

            const hitVisual = document.createElement('div');
            hitVisual.classList.add('hit-effect');
            hitVisual.style.left = (currentX - 5) + 'px'; 
            hitVisual.style.top = (currentY - 5) + 'px';
            gameArea.appendChild(hitVisual);
            
            setTimeout(() => hitVisual.remove(), 300);

            entity.style.transform = "scale(0)";
            setTimeout(() => entity.remove(), 100);

            if (entity.dataset.type === 'human') {
                hp--;
                updateHP();
                playSound('hurt'); 
                player.style.filter = "sepia(1) hue-rotate(-50deg) saturate(5)";
                setTimeout(() => player.style.filter = "none", 200);

                if (hp <= 0) endGame(false, "คุณเผลอโจมตีคนธรรมดา!");
            } else {
                playSound('punch'); 
                score++;
                scoreDisplay.innerText = score;
                if (score >= maxScore) endGame(true);
            }
        }

        entity.addEventListener('mousedown', hitEntity);
        entity.addEventListener('touchstart', hitEntity);
    }

    function endGame(isWin, reason = "ซอมบี้เข้าถึงตัวคุณแล้ว!") {
        gameActive = false;
        clearInterval(spawnInterval);
        document.querySelectorAll('.enemy, .human').forEach(e => e.remove()); 
        
        // หยุดเพลงประกอบเมื่อจบเกม
        bgMusic.pause();
        
        if (isWin) {
            messageDisplay.innerHTML = "🎉 สุดยอด! 🎉<br><br>ปกป้องพื้นที่สำเร็จ!<br><br><button onclick='location.reload()' style='padding:10px 20px; font-size:18px; cursor:pointer; border-radius: 10px; border: none; background: #2ecc71; color: white; font-weight: bold;'>เล่นอีกครั้ง</button>";
        } else {
            messageDisplay.innerHTML = `💀 GAME OVER 💀<br><br><span style='font-size: 20px;'>${reason}</span><br>กำจัดไปได้: ${score} ตัว<br><br><button onclick='location.reload()' style='padding:10px 20px; font-size:18px; cursor:pointer; border-radius: 10px; border: none; background: #e74c3c; color: white; font-weight: bold;'>ลองใหม่</button>`;
            messageDisplay.style.borderColor = "#e74c3c";
        }
        messageDisplay.style.display = "block";
    }
</script>
</body>

</html>
