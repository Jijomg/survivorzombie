<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คำสัญญาเอาชีวิตรอดในฝูงซอมบี้</title>
    <style>
        :root {
            --player-sprite: url('char1.png');
            --zombie-image: url('zombie.png');
            --background-image: url('Gemini_Generated_Image_mr7qvimr7qvimr7q.png');
            --human-image: url('human.png');
            --hit-effect-image: url('hit.png');
        }
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            touch-action: none;
            user-select: none;
        }
        #gameArea {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 932px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            background-image: var(--background-image);
            background-size: cover;
            background-position: bottom center;
            background-color: #5d6d7e;
        }
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #gameLogo { width: 85%; max-width: 350px; height: auto; margin-bottom: 30px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.7)); }
        .info-box { font-size: 19px; color: #ecf0f1; line-height: 1.5; margin-bottom: 30px; background: rgba(255,255,255,0.15); padding: 12px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .action-btn { padding: 12px 35px; font-size: 24px; font-weight: bold; color: white; background-color: #2ecc71; border: 2px solid #27ae60; border-radius: 12px; cursor: pointer; box-shadow: 0 6px 0 #27ae60, 0 10px 10px rgba(0,0,0,0.5); transition: all 0.1s; margin-top: 5px; }
        .action-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #27ae60, 0 4px 4px rgba(0,0,0,0.5); }

        #charSelectScreen { display: none; z-index: 45; padding: 10px; }
        #charSelectScreen h2 { color: #f1c40f; font-size: 28px; margin-top: 0; margin-bottom: 15px; text-shadow: 2px 2px 4px #000; }
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; width: 95%; max-width: 380px; }
        .char-option { width: 100%; aspect-ratio: 1; background-size: 280% auto; background-position: center 70%; background-color: rgba(255,255,255,0.8); border-radius: 12px; border: 3px solid #555; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; box-sizing: border-box; image-rendering: pixelated; }
        .char-option.selected { border-color: #2ecc71; box-shadow: 0 0 15px rgba(46,204,113,1); transform: scale(1.1); background-color: #fff; }

        #player {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 160px;
            background-image: var(--player-sprite);
            background-size: 240% 210%;
            background-position: center 100%;
            background-repeat: no-repeat;
            z-index: 10;
            image-rendering: pixelated;
            /* Use will-change to hint compositor - only on player since it animates */
            will-change: opacity, filter;
        }
        #player.punch-left  { background-position: 5% 5%; }
        #player.punch-right { background-position: 95% 5%; }

        /* Entities use CSS transform for position - GPU composited, no layout thrash */
        .entity {
            position: absolute;
            top: 0; left: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: crosshair;
            z-index: 5;
            /* translate() triggers compositor, not layout */
            will-change: transform;
        }
        .entity.zombie { width: 90px; height: 90px; background-image: var(--zombie-image); }
        .entity.human  { width: 80px; height: 80px; background-image: var(--human-image); cursor: not-allowed; }

        .hit-effect {
            position: absolute;
            top: 0; left: 0;
            width: 100px; height: 100px;
            background-image: var(--hit-effect-image);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 15;
            pointer-events: none;
            animation: burst 0.3s ease-out forwards;
        }
        @keyframes burst {
            0%   { opacity: 1; transform: translate(var(--hx), var(--hy)) scale(0.5); }
            50%  { opacity: 1; transform: translate(var(--hx), var(--hy)) scale(1.2); }
            100% { opacity: 0; transform: translate(var(--hx), var(--hy)) scale(1.5); }
        }

        #ui { position: absolute; top: 15px; left: 15px; font-size: 20px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 10px; z-index: 20; border: 2px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 28px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; display: none; text-align: center; z-index: 30; border: 3px solid #f1c40f; width: 80%; box-sizing: border-box; }
        .hp-heart { color: #e74c3c; }
    </style>
</head>
<body>
<div id="gameArea">
    <div id="startScreen" class="screen">
        <img id="gameLogo" src="logo.png" alt="โลโก้เกม" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<h1 style=\'color:#e74c3c;font-size:32px;margin-bottom:20px;line-height:1.2;\'>คำสัญญาเอาชีวิตรอด<br>ในฝูงซอมบี้</h1>');">
        <p class="info-box">🎯 <b>เป้าหมาย:</b> กำจัดซอมบี้ให้ครบ 100 ตัว<br><br>⚠️ <b>คำเตือน:</b> ห้ามโจมตีเพื่อนมนุษย์เด็ดขาด!</p>
        <button id="startBtn" class="action-btn">เริ่มภารกิจ</button>
    </div>

    <div id="charSelectScreen" class="screen">
        <h2>เลือกผู้รอดชีวิต</h2>
        <div class="char-grid">
            <div class="char-option selected" data-src="char1.png" style="background-image:url('char1.png');"></div>
            <div class="char-option" data-src="char2.png" style="background-image:url('char2.png');"></div>
            <div class="char-option" data-src="char3.png" style="background-image:url('char3.png');"></div>
            <div class="char-option" data-src="char4.png" style="background-image:url('char4.png');"></div>
            <div class="char-option" data-src="char5.png" style="background-image:url('char5.png');"></div>
            <div class="char-option" data-src="char6.png" style="background-image:url('char6.png');"></div>
            <div class="char-option" data-src="char7.png" style="background-image:url('char7.png');"></div>
            <div class="char-option" data-src="char8.png" style="background-image:url('char8.png');"></div>
        </div>
        <button id="playBtn" class="action-btn">ลุยเลย!</button>
    </div>

    <div id="ui">
        กำจัด: <span id="score" style="color:#2ecc71;">0</span> / 100<br>
        พลังชีวิต: <span id="hpDisplay"></span>
    </div>
    <div id="player"></div>
    <div id="message"></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let score = 0, hp = 5;
const MAX_SCORE = 100;
let gameActive = false;
let selectedCharacterUrl = 'char1.png';

// ─── DOM refs (cached once) ───────────────────────────────────────────────────
const gameArea      = document.getElementById('gameArea');
const startScreen   = document.getElementById('startScreen');
const charSelectScreen = document.getElementById('charSelectScreen');
const uiDisplay     = document.getElementById('ui');
const scoreDisplay  = document.getElementById('score');
const hpDisplay     = document.getElementById('hpDisplay');
const messageDisplay= document.getElementById('message');
const player        = document.getElementById('player');

// ─── Audio ────────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bgMusic  = new Audio('bgm.mp3');
bgMusic.loop   = true;
bgMusic.volume = 0.4;

function playSound(type) {
    if (audioCtx.state === 'suspended') return;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    if (type === 'punch') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.3);
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
    }
}

// ─── Entity pool ──────────────────────────────────────────────────────────────
// Instead of creating/destroying DOM nodes on every spawn, we reuse them.
const POOL_SIZE = 20;
const pool = [];          // inactive nodes
const active = [];        // { el, x, y, speedX, speedY, type, dead }

function acquireNode(type) {
    let el = pool.pop();
    if (!el) {
        el = document.createElement('div');
        el.classList.add('entity');
        // Attach ONE delegated handler per node (not re-added on reuse)
        el.addEventListener('mousedown', onHit);
        el.addEventListener('touchstart', onHit, { passive: false });
        gameArea.appendChild(el);
    }
    // Reset classes
    el.className = 'entity ' + type;
    el.style.transform = 'translate(0px, 0px)';
    el.style.opacity = '1';
    el.style.display = 'block';
    return el;
}

function releaseNode(record) {
    record.el.style.display = 'none';
    pool.push(record.el);
    const idx = active.indexOf(record);
    if (idx !== -1) active.splice(idx, 1);
}

// ─── Hit handler ─────────────────────────────────────────────────────────────
function onHit(e) {
    e.preventDefault();
    if (!gameActive) return;
    const el = e.currentTarget;
    const rec = active.find(r => r.el === el);
    if (!rec || rec.dead) return;
    rec.dead = true;

    // Punch animation on player
    player.className = (rec.x < targetX) ? 'punch-left' : 'punch-right';
    clearTimeout(player._punchTimer);
    player._punchTimer = setTimeout(() => { player.className = ''; }, 150);

    // Hit effect — reuse a single pooled element via CSS animation restart
    spawnHitEffect(rec.x, rec.y);

    releaseNode(rec);

    if (rec.type === 'human') {
        hp--; updateHP(); playSound('hurt');
        player.style.filter = 'sepia(1) hue-rotate(-50deg) saturate(5)';
        clearTimeout(player._filterTimer);
        player._filterTimer = setTimeout(() => { player.style.filter = 'none'; }, 200);
        if (hp <= 0) endGame(false, 'คุณเผลอโจมตีคนธรรมดา!');
    } else {
        playSound('punch');
        score++;
        scoreDisplay.textContent = score;
        if (score >= MAX_SCORE) endGame(true);
    }
}

// ─── Hit effect pool ─────────────────────────────────────────────────────────
const hitPool = [];
function spawnHitEffect(x, y) {
    let el = hitPool.pop();
    if (!el) {
        el = document.createElement('div');
        el.classList.add('hit-effect');
        gameArea.appendChild(el);
    }
    // Set CSS variables for the transform origin so animation uses translate
    el.style.setProperty('--hx', x + 'px');
    el.style.setProperty('--hy', y + 'px');
    // Restart animation by toggling display
    el.style.display = 'none';
    // Force reflow in one read (minimal)
    void el.offsetWidth;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; hitPool.push(el); }, 320);
}

// ─── Game dimensions (cached, updated on resize) ──────────────────────────────
let areaW, areaH, targetX, targetY;
function cacheLayout() {
    areaW   = gameArea.clientWidth;
    areaH   = gameArea.clientHeight;
    targetX = areaW / 2 - 45;
    targetY = player.offsetTop + player.offsetHeight / 2 - 45;
}

// ─── Single game loop (replaces N requestAnimationFrame loops) ────────────────
let lastSpawn = 0;
const SPAWN_INTERVAL_MS = 800; // matches original setInterval(800)

function gameLoop(timestamp) {
    if (!gameActive) return;

    // --- Spawn ---
    if (timestamp - lastSpawn >= SPAWN_INTERVAL_MS) {
        lastSpawn = timestamp;
        spawnEntity();
    }

    // --- Move all active entities in one loop ---
    for (let i = active.length - 1; i >= 0; i--) {
        const rec = active[i];
        if (rec.dead) continue;

        const dx = targetX - rec.x;
        const dy = targetY - rec.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 50) {
            rec.dead = true;
            releaseNode(rec);
            if (rec.type === 'zombie') {
                hp--; updateHP(); playSound('hurt');
                player.style.opacity = '0.5';
                clearTimeout(player._opacTimer);
                player._opacTimer = setTimeout(() => { player.style.opacity = '1'; }, 200);
                if (hp <= 0) { endGame(false); return; }
            }
            continue;
        }

        rec.x += (dx / dist) * rec.speed;
        rec.y += (dy / dist) * rec.speed;
        // translate() is GPU-composited — no layout recalc
        rec.el.style.transform = `translate(${rec.x}px, ${rec.y}px)`;
    }

    requestAnimationFrame(gameLoop);
}

// ─── Spawn ────────────────────────────────────────────────────────────────────
function spawnEntity() {
    const isHuman = Math.random() < 0.2;
    const type    = isHuman ? 'human' : 'zombie';
    const el      = acquireNode(type);

    const edge = (Math.random() * 3) | 0;
    let sx, sy;
    if      (edge === 0) { sx = -90;          sy = Math.random() * (areaH * 0.6); }
    else if (edge === 1) { sx = areaW + 90;   sy = Math.random() * (areaH * 0.6); }
    else                 { sx = Math.random() * (areaW - 90); sy = -90; }

    const speed = score < 50
        ? Math.random() * 1.0 + 0.8
        : Math.random() * 2.0 + 1.5;

    el.style.transform = `translate(${sx}px, ${sy}px)`;
    active.push({ el, x: sx, y: sy, speed, type, dead: false });
}

// ─── UI helpers ──────────────────────────────────────────────────────────────
function updateHP() {
    hpDisplay.innerHTML = '<span class="hp-heart">❤</span> '.repeat(hp);
}

function endGame(isWin, reason = 'ซอมบี้เข้าถึงตัวคุณแล้ว!') {
    gameActive = false;
    // Clear all active entities
    for (const rec of active) { rec.el.style.display = 'none'; pool.push(rec.el); }
    active.length = 0;
    bgMusic.pause();

    if (isWin) {
        messageDisplay.innerHTML = `🎉 สุดยอด! 🎉<br><br>ปกป้องพื้นที่สำเร็จ!<br><br><button onclick="location.reload()" style="padding:10px 20px;font-size:18px;cursor:pointer;border-radius:10px;border:none;background:#2ecc71;color:white;font-weight:bold;">เล่นอีกครั้ง</button>`;
    } else {
        messageDisplay.innerHTML = `💀 GAME OVER 💀<br><br><span style="font-size:20px;">${reason}</span><br>กำจัดไปได้: ${score} ตัว<br><br><button onclick="location.reload()" style="padding:10px 20px;font-size:18px;cursor:pointer;border-radius:10px;border:none;background:#e74c3c;color:white;font-weight:bold;">ลองใหม่</button>`;
        messageDisplay.style.borderColor = '#e74c3c';
    }
    messageDisplay.style.display = 'block';
}

// ─── Char select ─────────────────────────────────────────────────────────────
document.querySelectorAll('.char-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.char-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedCharacterUrl = opt.dataset.src;
        playSound('punch');
    });
});

// ─── Screen flow ─────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    bgMusic.play().catch(() => {});
    startScreen.style.display = 'none';
    charSelectScreen.style.display = 'flex';
});

document.getElementById('playBtn').addEventListener('click', () => {
    document.documentElement.style.setProperty('--player-sprite', `url('${selectedCharacterUrl}')`);
    charSelectScreen.style.display = 'none';
    uiDisplay.style.display = 'block';
    gameActive = true;
    cacheLayout();
    window.addEventListener('resize', cacheLayout, { passive: true });
    updateHP();
    requestAnimationFrame(gameLoop);
});
</script>
</body>
</html>
